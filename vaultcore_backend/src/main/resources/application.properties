# ===============================================
# VaultCore Financial Backend - application.properties
# ===============================================

spring.application.name=VaultCore-Financial-Backend

# ===============================================
# Server Configuration
# ===============================================
server.port=8081

# ? FIX: context-path REMOVED.
# Old code had: server.servlet.context-path=/api
# Controllers already have @RequestMapping("/api/...") so adding context-path
# made every URL become /api/api/... ? caused 404 on all endpoints
#
# Correct URLs are now:
#   POST http://localhost:8081/api/auth/login
#   POST http://localhost:8081/api/auth/register
#   GET  http://localhost:8081/api/auth/test      ? use this to verify routing works

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ===============================================
# Database - MySQL 8.0.45
# ===============================================
spring.datasource.url=jdbc:mysql://localhost:3306/vaultcore_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=vaultcore_user
spring.datasource.password=VaultCore@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================================
# Hikari Connection Pool
# ===============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=VaultCoreHikariCP
spring.datasource.hikari.auto-commit=true

# ===============================================
# JPA / Hibernate - MySQL 8.0.45
# ===============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================================
# JWT Configuration
# ===============================================
jwt.secret=mySecretKeyForJWTGeneration2024VaultCoreFinancialWithExtraSecurityMeasures
jwt.expiration=86400000
jwt.refresh.expiration=604800000
jwt.issuer=VaultCoreFinancial
jwt.audience=VaultCoreApp

# ===============================================
# Fraud Detection
# ===============================================
fraud.threshold=10000
fraud.two-factor-enabled=true
fraud.sms-mock-enabled=true

# ===============================================
# Logging
# ===============================================
logging.level.com.vaultcore=DEBUG
logging.level.org.springframework.web=INFO
# ? Set to DEBUG during development to see exactly what Spring Security is blocking
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.transaction=INFO
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=INFO
logging.level.com.mysql=INFO

logging.file.name=logs/vaultcore.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================================
# Virtual Threads (Java 21)
# ===============================================
spring.threads.virtual.enabled=true

# ===============================================
# Jackson
# ===============================================
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ===============================================
# CORS (reference values ? actual config in SecurityConfig.java)
# ===============================================
cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600
