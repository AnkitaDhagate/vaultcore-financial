# =====================================================
# CORS CONFIGURATION - ALLOW FRONTEND ACCESS
# =====================================================

# Allow React frontend to access backend
cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept
cors.allow-credentials=true
cors.max-age=3600

# Server port
server.port=8080

# Oracle Database Connection
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=vaultcore_user
spring.datasource.password=VaultCore123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA Configuration
# Important: Set this to validate (never create or update in production)
spring.jpa.hibernate.ddl-auto=validate

# Show SQL queries (for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Oracle Dialect - Choose based on your Oracle version
# For Oracle 12c and above:
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect


# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Fraud Detection Threshold
fraud.threshold=5000

# Logging
logging.level.com.vaultcore=DEBUG
logging.level.org.springframework.security=INFO